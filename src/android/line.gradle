allprojects {
  repositories {
    google()
    mavenCentral()
  }
}

android {
  defaultConfig {
    if (minSdkVersion == null || minSdkVersion.apiLevel < 24) {
      minSdkVersion 24
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
    implementation 'com.linecorp.linesdk:linesdk:5.12.0'
}
